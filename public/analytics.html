<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Analytics</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="page">
      <h1>Analytics</h1>
      <p id="analyticsUser" class="meta"></p>

      <div class="card">
        <h2>Number of Devices per Home</h2>
        <button id="loadDevicesPerHome">Load Report</button>
        <ul id="devicesPerHomeList"></ul>
      </div>

      <div class="card">
        <h2>Latest Reading per Sensor</h2>
        <button id="loadLatestReadings">Load Report</button>
        <button id="toggleLatestReadings" type="button">Hide Readings</button>
        <ul id="latestReadingsList"></ul>
      </div>

      <div class="card">
        <h2>Abnormal Sensor Readings</h2>
        <button id="loadAbnormalReadings">Load Report</button>
        <button id="toggleAbnormalReadings" type="button">Hide Readings</button>
        <ul id="abnormalReadingsList"></ul>
      </div>

      <div class="card">
        <h2>Alert Summary by Type (Last 30 Days)</h2>
        <button id="loadAlertSummary">Load Report</button>
        <ul id="alertSummaryList"></ul>
      </div>

      <div class="card">
        <h2>Average Reading Value by Sensor Type</h2>
        <button id="loadAverageReadings">Load Report</button>
        <ul id="averageReadingsList"></ul>
      </div>

      <div class="card">
        <h2>Number of Rooms per Home</h2>
        <button id="loadRoomsPerHome">Load Report</button>
        <ul id="roomsPerHomeList"></ul>
      </div>

      <div class="nav-links">
        <a href="/homes.html">Back to Homes</a>
      </div>
    </div>

    <script src="/js/format.js"></script>
    <script src="/js/analytics.js"></script>
  </body>
</html>
