<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sensor Readings</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="page">
      <h1>Sensor Readings</h1>
      <p id="selectedSensor" class="meta"></p>

      <div class="card" id="simulatorPanel">
        <h2>IoT Reading Simulator</h2>
        <p class="meta" id="simulatorHint">
          Real devices are not connected in this demo. Readings are generated by the system simulator.
        </p>
        <button id="simulateReadingBtn" type="button">Generate Simulated Reading</button>
        <p id="readingMessage" class="message"></p>
      </div>

      <div class="card">
        <h2>Filter</h2>
        <input id="readingFilter" placeholder="Filter by quality flag" />
      </div>

      <div class="card">
        <h2>Readings for this Sensor</h2>
        <button id="toggleReadingList" type="button">Hide Readings</button>
        <ul id="readingList"></ul>
      </div>

      <div class="nav-links">
        <a href="/sensors.html">Back to Sensors</a>
      </div>
    </div>

    <script src="/js/format.js"></script>
    <script src="/js/readings.js"></script>
  </body>
</html>
